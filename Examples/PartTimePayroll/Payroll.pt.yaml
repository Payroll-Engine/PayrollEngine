      value: -960
    - wageTypeNumber: 200   # IncomeTax:          2880 x 0.20 = 576
      value: 576
    - wageTypeNumber: 202   # IncomeTaxDelta:     576 - 768 = -192
      value: -192
    - wageTypeNumber: 210   # SocialSecurity:     2880 x 0.08 = 230.40
      value: 230.4
    - wageTypeNumber: 212   # SocialSecurityDelta: 230.40 - 307.20 = -76.80
      value: -76.8
    collectorResults:
    - collectorName: GrossIncome
      value: 2880
    - collectorName: Deductions
      value: 806.4

  # March — Anna retro period (February recalculated at 60%)
  - payrunJobName: FlexWorkPayrun.Mar25
    retroPeriodStart: 2025-02-01T00:00:00Z
    employeeIdentifier: anna.weber@flexwork.com
    wageTypeResults:
    - wageTypeNumber: 100   # BaseSalary:     4800 x 0.6 = 2880
      value: 2880
    - wageTypeNumber: 200   # IncomeTax:      2880 x 0.20 = 576
      value: 576
    - wageTypeNumber: 210   # SocialSecurity: 2880 x 0.08 = 230.40
      value: 230.4

  # March — Mark (unaffected by Anna's retro, all deltas zero)
  - payrunJobName: FlexWorkPayrun.Mar25
    employeeIdentifier: mark.bauer@flexwork.com
    wageTypeResults:
    - wageTypeNumber: 100   # BaseSalary:         5000
      value: 5000
