      value: 0
    - wageTypeNumber: 120   # Overtime:           no OT this period
      value: 0
    - wageTypeNumber: 200   # IncomeTax:          5000 x 0.20 = 1000
      value: 1000
    - wageTypeNumber: 202   # IncomeTaxDelta:     no retro
      value: 0
    - wageTypeNumber: 210   # SocialSecurity:     5000 x 0.08 = 400
      value: 400
    - wageTypeNumber: 212   # SocialSecurityDelta: no retro
      value: 0
    collectorResults:
    - collectorName: GrossIncome
      value: 5000
    - collectorName: Deductions
